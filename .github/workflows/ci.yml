name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      # Worker tests only need the LIGHT worker deps (geometry + schema), not
      # the ML stack (ultralytics/torch/opencv ~1GB). Installing those keeps CI
      # fast (~30s); worker/detect.py is excluded from coverage as it requires
      # cv2 + a video and cannot run in CI.
      - name: Install light worker test deps
        run: pip install shapely==2.0.6 python-ulid==3.0.0 structlog==24.4.0

      # worker/ uses a flat `schemas.py` module while api/ uses a `schemas/`
      # package — they cannot share sys.path in one process, so the two scopes
      # run as SEPARATE pytest invocations, each gating its own modules at 70%
      # (no --cov-append: blending scopes would pull untested api/schemas mirror
      # files into the worker number and vice-versa, producing a misleading gate).
      - name: Worker tests + coverage gate (geometry, zones, re-entry, staff)
        run: >
          pytest tests/test_line_crossing.py tests/test_zones.py tests/test_reentry.py tests/test_classify.py
          --cov=events --cov=schemas --cov=classify
          --cov-report=term-missing
          --cov-fail-under=70
        env:
          PYTHONPATH: worker

      - name: API tests + coverage gate (services)
        run: >
          pytest tests/test_api.py tests/test_pos_join.py tests/test_anomaly.py tests/test_investigation.py tests/test_brands.py tests/test_customers.py tests/test_clips.py tests/test_canonical.py tests/test_smoke.py
          --cov=services
          --cov-report=term-missing
          --cov-fail-under=70
        env:
          PYTHONPATH: api
