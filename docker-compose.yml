services:
  worker:
    build: ./worker
    volumes:
      - ./events:/events
      - ./data:/data:ro
      # so `run_pipeline.sh` (process-your-own-video) can see the orchestrator
      # script + the raw clips from inside the worker image:
      - ./scripts:/app/scripts:ro
      - ./resources:/app/resources:ro
    networks:
      - app_net

  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./events:/events
      - ./data:/data:ro
    networks:
      - app_net
    depends_on:
      - worker

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    networks:
      - app_net
    depends_on:
      - worker
    environment:
      # NEXT_PUBLIC_* is read by the BROWSER (client-side fetch), not the
      # container — so it must be the host-reachable URL, not the in-network
      # service name. The browser hits the API via the published localhost port.
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  # Optional metrics scraping — uncomment to enable. Prometheus scrapes the API
  # at api:8000/internal/metrics (see prometheus.yml) and serves its UI on :9090.
  # prometheus:
  #   image: prom/prometheus:v2.54.1
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   networks:
  #     - app_net
  #   depends_on:
  #     - api

networks:
  app_net:
