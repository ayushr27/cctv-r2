services:
  worker:
    build: ./worker
    volumes:
      - ./events:/events
      - ./data:/data:ro
    networks:
      - app_net

  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./events:/events
      - ./data:/data:ro
    networks:
      - app_net
    depends_on:
      - worker

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    networks:
      - app_net
    depends_on:
      - worker
    environment:
      # NEXT_PUBLIC_* is read by the BROWSER (client-side fetch), not the
      # container — so it must be the host-reachable URL, not the in-network
      # service name. The browser hits the API via the published localhost port.
      - NEXT_PUBLIC_API_URL=http://localhost:8000

networks:
  app_net:
